version: '3.9'
services:
  server:
    build: ./server
    command: npm run dev
    volumes:
      - ./server:/workspace/server
      - /workspace/server/node_modules
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/nexashop
      - CLIENT_ORIGIN=http://localhost:5173
      - ACCESS_TOKEN_SECRET=changeme_access_secret
      - REFRESH_TOKEN_SECRET=changeme_refresh_secret
      - EMAIL_SECRET=changeme_email_secret
      - EMAIL_HOST=smtp.example.com
      - EMAIL_PORT=587
      - EMAIL_SECURE=false
      - EMAIL_USER=you@example.com
      - EMAIL_PASS=supersecret
      - EMAIL_FROM=no-reply@nexashop.com
    depends_on:
      - mongo
  client:
    build: ./client
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./client:/workspace/client
      - /workspace/client/node_modules
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
volumes:
  mongo-data:
